name: Update Discord on release

on:
  release:
    types:
      - published

jobs:
  update-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Build Discord payload
        run: |
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          RELEASE_NAME="${{ github.event.release.name }}"
          RELEASE_URL="${{ github.event.release.html_url }}"
          PUBLISHED_AT="${{ github.event.release.published_at }}"

          PUBLISHED_JST=$(TZ=Asia/Tokyo date -d "$PUBLISHED_AT" '+%Y-%m-%d %H:%M:%S JST')

          cat > payload.json <<EOF
          {
            "content": "## カスタムDAT\n最終更新日: ${PUBLISHED_JST}\nバージョン: ${RELEASE_TAG}\nダウンロード: ${RELEASE_URL}"
          }
          EOF

      - name: Edit Discord message
        run: |
          curl -X PATCH \
            -H "Content-Type: application/json" \
            -d @payload.json \
            "${{ secrets.DISCORD_WEBHOOK_URL }}/messages/${{ secrets.DISCORD_MESSAGE_ID }}"
