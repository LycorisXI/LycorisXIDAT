name: Release Custom DAT and Update Discord Message

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Custom DAT zip
        run: |
          zip -r LycorisXI-CustomDAT.zip ROM

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            LycorisXI-CustomDAT.zip \
            --title "${GITHUB_REF_NAME}" \
            --notes "Custom DAT release ${GITHUB_REF_NAME}"

      - name: Build Discord payload
        run: |
          RELEASE_JST=$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S JST')
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"

          cat > payload.json <<EOF
          {
            "content": "## カスタムDAT\n最新リリース日: ${RELEASE_JST}\nバージョン: ${GITHUB_REF_NAME}\nダウンロード: ${RELEASE_URL}"
          }
          EOF

      - name: Edit Discord message
        run: |
          curl -X PATCH \
            -H "Content-Type: application/json" \
            -d @payload.json \
            "${{ secrets.DISCORD_WEBHOOK_URL }}/messages/${{ secrets.DISCORD_MESSAGE_ID }}"
